{% extends "base.html" %}
{% block title %}Register Page{% endblock %}
{% block content %}
 <title>Registration Page for Aquatic Pandas</title>
    </head>
    <body>
         <h1>Register for an Account</h1>
        
        <!-- /register is a 'placeholder' for the actual registration endpoint -->
        <form action="/register" method="post">
                   <main class = "form-side">
                <div class="card">
                    <h2 class="card-title">Welcome to Aquatic Pandas</h2>
                    <p class="card-description">Please enter your details to register</p>
                   
                    <div class = "input-email">
                        <label for = "email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email" name="email" required>
                    </div>

                    <div class = "input-first-name">
                        <label for = "first_name">First Name</label>
                        <input type="text" id="first_name" placeholder="Enter your first name" name="first_name" required>
                    </div>
                    <div class = "input-last-name">
                        <label for = "last_name">Last Name</label>
                        <input type="text" id="last_name" placeholder="Enter your last name" name="last_name" required>
                    </div>
                    
                   <div class ="input-phone-number">
                        <label for = "phone_number">Phone Number</label>
                        <input type="text" id="phone_number" placeholder="Enter your phone number" name="phone_number" required>

                    <div class = "input-password">
                        <label for = "password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" name="password" required>
                    </div>
                    <!-- when button is pressed check registration details and redirect to login page or display error message -->
                     
                    <button type="submit" onclick="create_account()">Register</button>
                </div>
            </main>
        </form>
            <button onclick="window.location.href='/login'">Login</button>
    </body>
{% endblock %}
