<!doctype html>
<html>
<head>
    <link rel="stylesheet" href="../static/bootstrap.min.css" />
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <img src="../static/AquaticPandas_Logo_Orange.png" alt="Logo" width="40">
                    AquaticPandas
                </a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-bs-target="#navbarColor01" aria-controls="navbarColor01" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarColor01">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item active">
                            <a class="nav-link" active href="/">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/budget">Budget</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/transactions">Transactions</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/accounts">Accounts</a>
                        </li>
                    </ul>
                    <ul class="navbar-nav" >
                        <li  class="nav-item">
                            <a class="nav-link" href="/login">Login</a>
                        </li>
                        <li  class="nav-item">
                            <a class="nav-link" href="/register">Register</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="container">
        <main role="main" class="pb-3">
            <br/>
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <footer class="fixed-bottom border-top footer text-muted">
        <div class="container py-3">
            &copy; 2026 - AquaticPandas
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
</html>
